apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - dex.yaml
patches:
  - target:
      kind: Deployment
      name: frontend 
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: github-client
              key: client-id
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: github-client
              key: client-secret