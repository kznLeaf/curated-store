#     count: 2
#   - name: adservice
#     count: 2
#   - name: recommendationservice
#     count: 2
#   - name: emailservice
#     count: 2
#   - name: cartservice
#     count: 2
#   - name: checkoutservice
#     count: 2
components:
- ./components/opentelementry
- ./components/Dex

