apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      serviceAccountName: oauth2-proxy
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4180
        envFrom:
        - secretRef:
            name: oauth2-proxy-credentials
        env:
        - name: OAUTH2_PROXY_PROVIDER
          value: "google"
        - name: OAUTH2_PROXY_HTTP_ADDRESS
          value: "0.0.0.0:4180"
        - name: OAUTH2_PROXY_UPSTREAMS
          value: "http://frontend:80"
        - name: OAUTH2_PROXY_REDIRECT_URL
          value: "http://localhost:8080/oauth2/callback"
        - name: OAUTH2_PROXY_REVERSE_PROXY
          value: "true"
        - name: OAUTH2_PROXY_EMAIL_DOMAINS
          value: "*"
        - name: OAUTH2_PROXY_SCOPE
          value: "openid email"
        - name: OAUTH2_PROXY_SKIP_AUTH_ROUTES
          value: "^/$|^/login|^/setCurrency|^/static/|^/product/"
        - name: OAUTH2_PROXY_SKIP_PROVIDER_BUTTON
          value: "true"
        - name: OAUTH2_PROXY_SESSION_STORE_TYPE
          value: "cookie"
        - name: OAUTH2_PROXY_SESSION_COOKIE_MINIMAL
          value: "false"
        - name: OAUTH2_PROXY_PASS_ACCESS_TOKEN
          value: "false"
        - name: OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER
          value: "true"
        - name: OAUTH2_PROXY_SET_AUTHORIZATION_HEADER
          value: "true"
        - name: OAUTH2_PROXY_SET_XAUTHREQUEST
          value: "false"
        - name: OAUTH2_PROXY_COOKIE_NAME
          value: "_oauth2_proxy"
        - name: OAUTH2_PROXY_COOKIE_REFRESH
          value: "1h"
        - name: OAUTH2_PROXY_COOKIE_EXPIRE
          value: "8h"
        - name: OAUTH2_PROXY_COOKIE_HTTPONLY
          value: "true"
        - name: OAUTH2_PROXY_COOKIE_SAMESITE # avoid "Unable to find a valid CSRF token in the request" error
          value: "lax" # see https://github.com/oauth2-proxy/oauth2-proxy/issues/2830
        - name: OAUTH2_PROXY_COOKIE_CSRF_PER_REQUEST
          value: "false"  # 生产环境建议设置为 true，以增强安全性，但在开发环境中可能会导致频繁的 CSRF 错误  default:false
        - name: OAUTH2_PROXY_COOKIE_CSRF_EXPIRE
          value: "5m"
        - name: OAUTH2_PROXY_WHITELIST_DOMAINS
          value: "localhost:8080,127.0.0.1:8080"
        - name: OAUTH2_PROXY_COOKIE_SECURE
          value: "false"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  labels:
    app: oauth2-proxy
spec:
  selector:
    app: oauth2-proxy
  ports:
  - name: http
    port: 80
    targetPort: 4180
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oauth2-proxy
