syntax = "proto3";

option go_package = "demo/hipstershop";

package hipstershop;

message Empty {}

message Money {
    // The 3-letter currency code defined in ISO 4217.
    string currency_code = 1;

    // The whole units of the amount. 整数部分，单位为货币代码
    // For example if `currencyCode` is `"USD"`, then 1 unit is one US dollar.
    int64 units = 2;

    // Number of nano (10^-9) units of the amount.  纳秒单位，用于表示小数部分
    // The value must be between -999,999,999 and +999,999,999 inclusive.
    // If `units` is positive, `nanos` must be positive or zero.
    // If `units` is zero, `nanos` can be positive, zero, or negative.
    // If `units` is negative, `nanos` must be negative or zero.
    // For example $-1.75 is represented as `units`=-1 and `nanos`=-750,000,000. 负数表示退款，正数表示付款
    int32 nanos = 3;
}

// ---------------Product Catalog----------------

service ProductCatalogService {
    rpc ListProducts(Empty) returns (ListProductsResponse) {}
    rpc GetProduct(GetProductRequest) returns (Product) {}
    rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse) {}
}

message Product {
    string id = 1;
    string name = 2;
    string description = 3;
    string picture = 4;
    Money price_usd = 5;

    // Categories such as "clothing" or "kitchen" that can be used to look up
    // other related products.
    repeated string categories = 6;
}

message ListProductsResponse {
    repeated Product products = 1;
}

message GetProductRequest {
    string id = 1;
}

message SearchProductsRequest {
    string query = 1;
}

message SearchProductsResponse {
    repeated Product results = 1;
}


// -----------------Currency service-----------------

// 和汇率有关的服务
service CurrencyService {
    // 获取支持的货币列表
    rpc GetSupportedCurrencies(Empty) returns (GetSupportedCurrenciesResponse) {}
    // 将一种货币转换为另一种货币
    rpc Convert(CurrencyConversionRequest) returns (Money) {}
}

message GetSupportedCurrenciesResponse {
    // The 3-letter currency code defined in ISO 4217.
    repeated string currency_codes = 1;
}

// 封装货币转换请求，例如：
// CurrencyConversionRequest {
//     from: {
//         currency_code: "USD",
//         units: 1,
//         nanos: 0
//     }
//     to_code: "EUR"
// }
// 表示将 1 美元转换为欧元
message CurrencyConversionRequest {
    Money from = 1;

    // The 3-letter currency code defined in ISO 4217.
    string to_code = 2;
}

// ---------------Shipping Service----------

message Address {
    string street_address = 1;
    string city = 2;
    string state = 3;
    string country = 4;
    int32 zip_code = 5;
}

message CartItem {
    string product_id = 1;
    int32  quantity = 2;
}

service ShippingService {
    rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse) {} // 获取运费报价，具体实现见 shippingservice/main.go 文件
    rpc ShipOrder(ShipOrderRequest) returns (ShipOrderResponse) {} // 发货，具体实现见 shippingservice/main.go 文件
}

message GetQuoteRequest {
    Address address = 1; // 收货地址
    repeated CartItem items = 2; // 购物车中的商品列表
}

message GetQuoteResponse {
    Money cost_usd = 1;
}

message ShipOrderRequest {
    Address address = 1; // 收货地址
    repeated CartItem items = 2; // 购物车中的商品列表
}

message ShipOrderResponse {
    string tracking_id = 1; // 物流跟踪号
}

// -------------Payment service-----------------

service PaymentService {
    // Charge 属于 PaymentService 的核心方法，处理 ChargeRequest 请求，调用 charge 函数进行信用卡验证和扣款，并返回 ChargeResponse 或错误。
    rpc Charge(ChargeRequest) returns (ChargeResponse) {}
}

message CreditCardInfo {
    string credit_card_number = 1;
    int32 credit_card_cvv = 2;
    int32 credit_card_expiration_year = 3;
    int32 credit_card_expiration_month = 4;
}

message ChargeRequest {
    Money amount = 1; // 支付金额
    CreditCardInfo credit_card = 2; // 信用卡信息
}

message ChargeResponse {
    string transaction_id = 1;
}

// ------------Ad service------------------

service AdService {
    rpc GetAds(AdRequest) returns (AdResponse) {}
}

message AdRequest {
    // List of important key words from the current page describing the context.
    repeated string context_keys = 1;
}

message AdResponse {
    repeated Ad ads = 1;
}

message Ad {
    // url to redirect to when an ad is clicked.
    string redirect_url = 1;

    // short advertisement text to display.
    string text = 2;
}

// ---------------Recommendation service----------

// 推荐服务
service RecommendationService {
    // 根据用户 ID 和商品 ID 列表，返回推荐的商品 ID 列表
  rpc ListRecommendations(ListRecommendationsRequest) returns (ListRecommendationsResponse){}
}

message ListRecommendationsRequest {
    string user_id = 1;
    repeated string product_ids = 2;
}
// ListRecommendationsResponse 获取商城中的所有产品，去除用户购物车中的产品后，
message ListRecommendationsResponse {
    repeated string product_ids = 1;
}

// -------------Email service-----------------

service EmailService {
    rpc SendOrderConfirmation(SendOrderConfirmationRequest) returns (Empty) {}
}

message OrderItem {
    CartItem item = 1;
    Money cost = 2;
}

message OrderResult {
    string   order_id = 1;
    string   shipping_tracking_id = 2;
    Money shipping_cost = 3;
    Address  shipping_address = 4;
    repeated OrderItem items = 5;
}

message SendOrderConfirmationRequest {
    string email = 1;
    OrderResult order = 2;
}

// -----------------Cart service-----------------

service CartService {
    rpc AddItem(AddItemRequest) returns (Empty) {}
    rpc GetCart(GetCartRequest) returns (Cart) {}
    rpc EmptyCart(EmptyCartRequest) returns (Empty) {}
}



message AddItemRequest {
    string user_id = 1;
    CartItem item = 2;
}

message EmptyCartRequest {
    string user_id = 1;
}

message GetCartRequest {
    string user_id = 1;
}

message Cart {
    string user_id = 1;
    repeated CartItem items = 2;
}