# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: "ci-main-pr-test"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "main", "dev" ]
    paths: &file_paths
      - "src/frontend/**"
      - "src/productcatalogservice/**"
      - "!**/README.md"
  pull_request:
    branches: [ "main", "dev" ]
    paths: *file_paths

jobs:
  code-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Create Dummy Secret File for Validation
      run: |
        touch kubernetes-manifests/.env.secret
        echo "OAUTH2_PROXY_CLIENT_ID=mock-id" >> kubernetes-manifests/.env.secret
        echo "OAUTH2_PROXY_CLIENT_SECRET=mock-secret" >> kubernetes-manifests/.env.secret
        echo "OAUTH2_PROXY_COOKIE_SECRET=O5lVpn4w9vsHFjFLP6YNnZ-jc9I_GQj4Uc8cKxc=" >> kubernetes-manifests/.env.secret
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'
        cache-dependency-path: |
          src/productcatalogservice/go.sum
          src/frontend/go.sum
    - name: GO Unit Tests
      timeout-minutes: 10
      run: |
        for GO_PACKAGE in "productcatalogservice" "frontend/validator"; do
          echo "Testing $GO_PACKAGE..."
          pushd src/$GO_PACKAGE
          go test
          popd
        done

