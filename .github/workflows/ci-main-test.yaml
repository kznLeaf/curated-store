# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: "Continuous Integration Unit Tests - Main"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ "main", "cicd-pipeline" ]
    paths-ignore:
      - '**/README.md'
      - 'kubernetes-manifests/**'
      - "src/loadgenerator/**"
      - "src/recommendationservice/**"
      - "src/emailservice/**"

jobs:
  code-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'
        cache-dependency-path: |
          src/productcatalogservice/go.sum
          src/frontend/go.sum
    - name: GO Unit Tests
      timeout-minutes: 10
      run: |
        for GO_PACKAGE in "productcatalogservice"; do
          echo "Testing $GO_PACKAGE..."
          pushd src/$GO_PACKAGE
          go test
          popd
        done
  skaffold-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install skaffold
      run: |
        curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64 && \
        sudo install skaffold /usr/local/bin/
    - name: Skaffold Check
      run: |
        skaffold diagnose --check
